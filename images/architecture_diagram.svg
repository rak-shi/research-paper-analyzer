<svg width="680" height="756" viewBox="0 0 680 756" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Multi-agent architecture for the AI-Powered Research Paper Analyzer</title>
<desc>Input flows into a Boss Agent orchestrator, which delegates to a Paper Analyzer agent, then a Review agent gates progress. On approval, three parallel agents (Summary Generator, Citation Extractor, Key Insights) run, each checked by a second Review agent stage, before the Boss Agent combines everything into the final research brief output.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<line x1="340" y1="76" x2="340" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="166" x2="340" y2="198" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="256" x2="340" y2="288" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<path d="M340 346 L340 365 L140 365 L140 388" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="346" x2="340" y2="388" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 346 L340 365 L540 365 L540 388" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<path d="M140 446 L140 465 L340 465 L340 478" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="446" x2="340" y2="478" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M540 446 L540 465 L340 465 L340 478" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="340" y1="536" x2="340" y2="568" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="626" x2="340" y2="658" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="240" y="20" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="38" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A" font-family="sans-serif">Input</text>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441" font-family="sans-serif">PDF or paper URL</text></g>

<g class="c-teal"><rect x="240" y="110" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="128" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="sans-serif">Boss agent</text>
<text x="340" y="148" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041" font-family="sans-serif">Orchestrates workflow</text></g>

<g class="c-purple"><rect x="240" y="200" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="218" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C" font-family="sans-serif">Paper analyzer</text>
<text x="340" y="238" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489" font-family="sans-serif">Methodology &amp; findings</text></g>

<g class="c-coral"><rect x="240" y="290" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="308" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C" font-family="sans-serif">Review agent</text>
<text x="340" y="328" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13" font-family="sans-serif">Score &#8805;7 to approve</text></g>
<text x="460" y="322" font-size="12" fill="#5F5E5A" font-family="sans-serif">&#8635; retry if &lt;7 (max 2)</text>

<g class="c-purple"><rect x="50" y="390" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="140" y="408" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C" font-family="sans-serif">Summary generator</text>
<text x="140" y="428" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489" font-family="sans-serif">Executive summary</text></g>

<g class="c-purple"><rect x="250" y="390" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="408" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C" font-family="sans-serif">Citation extractor</text>
<text x="340" y="428" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489" font-family="sans-serif">Refs &amp; citations</text></g>

<g class="c-purple"><rect x="450" y="390" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="540" y="408" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C" font-family="sans-serif">Key insights</text>
<text x="540" y="428" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489" font-family="sans-serif">Takeaways (bonus)</text></g>

<g class="c-coral"><rect x="240" y="480" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="498" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C" font-family="sans-serif">Review agent</text>
<text x="340" y="518" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13" font-family="sans-serif">Quality control check</text></g>
<text x="460" y="512" font-size="12" fill="#5F5E5A" font-family="sans-serif">&#8635; retry if &lt;7 (max 2)</text>

<g class="c-teal"><rect x="240" y="570" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="588" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="sans-serif">Boss agent</text>
<text x="340" y="608" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041" font-family="sans-serif">Combines outputs</text></g>

<g class="c-gray"><rect x="240" y="660" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="678" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A" font-family="sans-serif">Output</text>
<text x="340" y="698" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441" font-family="sans-serif">Complete research brief</text></g>
</svg>
